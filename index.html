                                       ยกเลิก
                                   </button>
                               )}
                           </div>
                        </div>
                      </div>
                    </form>
                  </div>
                )}

                {/* Table Section (Pagination & Data) */}
                <div className="bg-white rounded-3xl shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden min-h-[400px]">
                  <div className="p-4 sm:p-6 border-b border-gray-100 flex justify-between items-center bg-white">
                      <h3 className="text-lg font-semibold text-gray-800">ประวัติการรับบริการ: {selectedHn}</h3>
                      <span className="text-sm text-gray-500">ทั้งหมด {displayHistory.length} รายการ</span>
                  </div>
                  
                  {loadingHistory ? (
                      <div className="flex justify-center py-12"><Loader2 size={36} className="animate-spin text-[#eec676]" /></div>
                  ) : displayHistory.length === 0 ? (
                      <div className="flex flex-col items-center justify-center py-12 text-gray-400">
                          <FileText size={40} className="text-gray-200 mb-3" />
                          <p>{t.no_data}</p>
                      </div>
                  ) : (
                      <React.Fragment>
                          <div className="overflow-x-auto">
                              <table className="w-full text-left border-collapse">
                                  <thead className="bg-gray-50/90 border-b border-gray-100">
                                      <tr className="text-gray-500 text-xs uppercase tracking-wider">
                                          <th className="p-4 font-medium whitespace-nowrap w-[15%]">{t.date}</th>
                                          <th className="p-4 font-medium min-w-[200px] w-[50%]">{t.details}</th>
                                          <th className="p-4 font-medium whitespace-nowrap w-[15%]">{t.therapist}</th>
                                          <th className="p-4 font-medium text-center whitespace-nowrap w-[10%]">การมองเห็น</th>
                                          <th className="p-4 font-medium text-center whitespace-nowrap w-[10%]">จัดการ</th>
                                      </tr>
                                  </thead>
                                  <tbody className="divide-y divide-gray-100">
                                      {paginatedHistory.map((item, i) => {
                                          const isRecordVisible = item.IsVisible === true || item.IsVisible === 'TRUE' || item.IsVisible === 'true';
                                          return (
                                              <tr key={i} className={`hover:bg-gray-50/80 transition-colors ${user.role !== 'parent' && !isRecordVisible ? 'opacity-70' : ''}`}>
                                                  <td className="p-4 text-sm text-gray-900 font-medium align-top whitespace-nowrap">
                                                      {item.Date ? formatThaiDate(item.Date) : 'N/A'}
                                                  </td>
                                                  <td className="p-4 text-sm text-gray-700 whitespace-pre-line leading-relaxed align-top">
                                                      {item.Details}
                                                  </td>
                                                  <td className="p-4 text-sm text-gray-600 align-top whitespace-nowrap">
                                                      <span className="bg-gray-100 px-2.5 py-1 rounded-md">{item.Therapist}</span>
                                                  </td>
                                                  <td className="p-4 text-center align-top">
                                                      {user.role !== 'parent' ? (
                                                          <button onClick={() => toggleVisibility(item.ID, item.IsVisible)} className="p-1.5 rounded-lg hover:bg-gray-200 transition-colors inline-block" title={isRecordVisible ? t.visible_desc : t.hidden_desc}>
                                                              {isRecordVisible ? <Eye size={18} className="text-green-600" /> : <EyeOff size={18} className="text-gray-400" />}
                                                          </button>
                                                      ) : (
                                                          isRecordVisible ? <Eye size={18} className="text-green-600 inline-block" /> : <EyeOff size={18} className="text-gray-400 inline-block" />
                                                      )}
                                                  </td>
                                                  <td className="p-4 align-top">
                                                      <div className="flex items-center justify-center gap-1.5 flex-wrap">
                                                          {item.FileUrl && (
                                                              <a href={item.FileUrl} target="_blank" rel="noreferrer" className="p-1.5 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors" title="ดูไฟล์แนบ">
                                                                  <FileText size={16} />
                                                              </a>
                                                          )}
                                                          {user.role !== 'parent' && (
                                                              <React.Fragment>
                                                                <button onClick={() => handleEditOPD(item)} className="p-1.5 text-[#eec676] hover:bg-[#eec676]/10 rounded-lg transition-colors" title="แก้ไข">
                                                                    <Edit2 size={16} />
                                                                </button>
                                                                <button onClick={() => handleDeleteOPD(item.ID)} className="p-1.5 text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="ลบ">
                                                                    <Trash2 size={16} />
                                                                </button>
                                                              </React.Fragment>
                                                          )}
                                                      </div>
                                                  </td>
                                              </tr>
                                          );
                                      })}
                                  </tbody>
                              </table>
                          </div>
                          
                          {/* Pagination Controls */}
                          {totalPages > 1 && (
                              <div className="p-4 border-t border-gray-100 flex items-center justify-between bg-white shrink-0 mt-auto">
                                  <p className="text-sm text-gray-500">หน้า {currentPage} จาก {totalPages}</p>
                                  <div className="flex gap-2">
                                      <button 
                                          disabled={currentPage === 1} 
                                          onClick={() => setCurrentPage(p => p - 1)}
                                          className="p-2 border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed text-gray-600"
                                      ><ChevronLeft size={16}/></button>
                                      <button 
                                          disabled={currentPage === totalPages} 
                                          onClick={() => setCurrentPage(p => p + 1)}
                                          className="p-2 border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed text-gray-600"
                                      ><ChevronRight size={16}/></button>
                                  </div>
                              </div>
                          )}
                      </React.Fragment>
                  )}
                </div>

              </div>
            )}
          </div>

          <Modal isOpen={!!selectedOPD} onClose={() => setSelectedOPD(null)} title="รายละเอียดการรับบริการ">
            {selectedOPD && (
              <div className="space-y-6">
                <div className="flex items-center justify-between border-b border-gray-100 pb-4">
                  <div>
                    <p className="text-xs text-gray-500">{t.date}</p>
                    <p className="font-semibold text-gray-900">{formatThaiDate(selectedOPD.Date)}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-xs text-gray-500">{t.therapist}</p>
                    <p className="font-medium text-[#dcb360] bg-[#eec676]/10 px-3 py-1 rounded-full text-sm inline-block mt-1">{selectedOPD.Therapist}</p>
                  </div>
                </div>
                
                <div>
                  <p className="text-xs font-medium text-gray-500 mb-2">{t.details}</p>
                  <div className="bg-gray-50 p-4 rounded-2xl text-sm text-gray-700 whitespace-pre-line leading-relaxed border border-gray-100">
                    {selectedOPD.Details}
                  </div>
                </div>

                {selectedOPD.FileUrl && (
                  <div>
                     <p className="text-xs font-medium text-gray-500 mb-2">ไฟล์แนบ</p>
                     <a href={selectedOPD.FileUrl} target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-sm font-medium hover:bg-blue-100 transition-colors">
                       <FileText size={16} /> ดูเอกสารแนบ
                     </a>
                  </div>
                )}
              </div>
            )}
          </Modal>

        </React.Fragment>
      );
    };

    // --- Files View ---
    const FilesView = ({ t, patients }) => {
      const [selectedPatient, setSelectedPatient] = useState('');
      const [isUploading, setIsUploading] = useState(false);

      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || !selectedPatient) return;

        const patientData = patients.find(p => String(p.HN) === String(selectedPatient));
        if (!patientData) return;

        setIsUploading(true);
        try {
          await uploadBase64ToGAS(file, patientData);
          if(window.Swal) window.Swal.fire({ title: t.upload_success, icon: 'success', confirmButtonColor: THEME.primary });
        } catch (err) {
          if(window.Swal) window.Swal.fire({ title: t.error, text: err.message, icon: 'error', confirmButtonColor: THEME.primary });
        } finally {
          setIsUploading(false);
          e.target.value = ''; // clear input
        }
      };

      return (
        <div className="animate-in fade-in duration-500 max-w-4xl mx-auto">
          <h2 className="text-2xl font-bold text-gray-800 mb-6">{t.file_manager}</h2>
          
          <div className="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 mb-6">
            <label className="block text-sm font-medium text-gray-700 mb-2">{t.select_patient}</label>
            <select value={selectedPatient} onChange={e => setSelectedPatient(e.target.value)} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#eec676] focus:bg-white transition-colors mb-6 font-medium">
              <option value="">{t.select_patient}</option>
              {patients.map(p => <option key={p.HN} value={p.HN}>{p.HN} - {p.Name} {p.LastName}</option>)}
            </select>

            <div className={`border-2 border-dashed rounded-2xl p-10 text-center transition-all ${selectedPatient ? 'border-[#eec676] bg-[#eec676]/5' : 'border-gray-200 bg-gray-50 opacity-60'}`}>
              <UploadCloud size={48} className={`mx-auto mb-4 ${selectedPatient ? 'text-[#dcb360]' : 'text-gray-300'}`} />
              <p className="text-gray-600 mb-5 font-medium">{t.upload}</p>
              <div className="max-w-xs mx-auto">
                <input 
                  type="file" 
                  onChange={handleFileUpload} 
                  disabled={!selectedPatient || isUploading}
                  className="block w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-5 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-[#eec676]/20 file:text-[#dcb360] hover:file:bg-[#eec676]/30 cursor-pointer disabled:cursor-not-allowed"
                />
              </div>
              {isUploading && <p className="text-sm text-[#dcb360] mt-5 flex items-center justify-center gap-2 font-medium"><Loader2 size={18} className="animate-spin" /> {t.uploading}</p>}
            </div>
          </div>
        </div>
      );
    };

    // --- Reports View ---
    const ReportsView = ({ t, patients }) => {
      const statusCounts = useMemo(() => {
        const counts = { active: 0, pending: 0, inactive: 0 };
        patients.forEach(p => {
          const s = String(p.Status).toLowerCase();
          if (counts[s] !== undefined) counts[s]++;
          else counts.inactive++; 
        });
        return counts;
      }, [patients]);

      const total = patients.length || 1;

      return (
        <div className="animate-in fade-in duration-500">
           <h2 className="text-2xl font-bold text-gray-800 mb-6">{t.stats_report}</h2>
           <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                <h3 className="text-lg font-semibold text-gray-800 mb-8 w-full text-left">{t.status}</h3>
                
                <div className="w-48 h-48 rounded-full relative shadow-inner mb-8 transition-all hover:scale-105" style={{
                  background: `conic-gradient(
                    #22c55e 0% ${(statusCounts.active/total)*100}%, 
                    #eab308 ${(statusCounts.active/total)*100}% ${((statusCounts.active + statusCounts.pending)/total)*100}%, 
                    #94a3b8 ${((statusCounts.active + statusCounts.pending)/total)*100}% 100%
                  )`
                }}>
                  <div className="absolute inset-4 bg-white rounded-full flex items-center justify-center shadow-sm">
                    <span className="text-3xl font-bold text-gray-800">{patients.length}</span>
                  </div>
                </div>

                <div className="w-full space-y-3 text-sm font-medium">
                  <div className="flex justify-between items-center bg-gray-50 px-4 py-2 rounded-lg"><span className="flex items-center gap-3"><div className="w-3 h-3 rounded-full bg-green-500 shadow-sm"></div> Active</span><span className="text-gray-900">{statusCounts.active}</span></div>
                  <div className="flex justify-between items-center bg-gray-50 px-4 py-2 rounded-lg"><span className="flex items-center gap-3"><div className="w-3 h-3 rounded-full bg-yellow-500 shadow-sm"></div> Pending</span><span className="text-gray-900">{statusCounts.pending}</span></div>
                  <div className="flex justify-between items-center bg-gray-50 px-4 py-2 rounded-lg"><span className="flex items-center gap-3"><div className="w-3 h-3 rounded-full bg-slate-400 shadow-sm"></div> Inactive</span><span className="text-gray-900">{statusCounts.inactive}</span></div>
                </div>
              </div>
           </div>
        </div>
      );
    };

    // เชื่อมต่อ React เข้ากับ DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
